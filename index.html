// ─── SHARED UI ───────────────────────────────────────────────────────────────

function NavBar({active, onNav}) {
  const tabs = [{id:'home',label:'Home',icon:'🏠'},{id:'map',label:'Map',icon:'🗺️'},{id:'awards',label:'Awards',icon:'🏆'},{id:'profile',label:'Profile',icon:'👤'}];
  return (
    <nav style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,background:'#1e3a5f',display:'flex',borderTop:'1px solid rgba(255,255,255,0.1)',zIndex:100,paddingBottom:'env(safe-area-inset-bottom)'}}>
      {tabs.map(t => (
        <button key={t.id} onClick={()=>onNav(t.id)} style={{flex:1,padding:'10px 4px 8px',border:'none',background:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:2,cursor:'pointer',color:active===t.id?'#22c55e':'rgba(255,255,255,0.5)',fontSize:10,fontWeight:active===t.id?700:400}}>
          <span style={{fontSize:22}}>{t.icon}</span>{t.label}
        </button>
      ))}
    </nav>
  );
}

function ProgressBar({value,max,color='#22c55e',h=8}) {
  const pct = Math.min(100,(value/max)*100);
  return (
    <div style={{background:'rgba(0,0,0,0.15)',borderRadius:99,overflow:'hidden',height:h}}>
      <div style={{height:'100%',width:`${pct}%`,background:color,borderRadius:99,transition:'width 0.5s ease',boxShadow:`0 0 6px ${color}88`}}/>
    </div>
  );
}

function Stars({count=0,max=3,size=24}) {
  return <div style={{display:'flex',gap:2}}>{Array.from({length:max}).map((_,i)=><span key={i} style={{fontSize:size,filter:i<count?'none':'grayscale(1) opacity(0.3)'}}>⭐</span>)}</div>;
}

function Btn({children,onClick,disabled,secondary,style={}}) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      background: disabled?'#6b7280':secondary?'rgba(255,255,255,0.15)':'linear-gradient(135deg,#16a34a,#22c55e)',
      color:'#fff',border:secondary?'2px solid rgba(255,255,255,0.3)':'none',
      borderRadius:14,padding:'13px 20px',fontSize:15,fontWeight:800,
      cursor:disabled?'not-allowed':'pointer',
      boxShadow:disabled||secondary?'none':'0 4px 12px rgba(34,197,94,0.4)',
      transition:'all 0.15s',...style
    }}>{children}</button>
  );
}

// ─── PITCH SVG ────────────────────────────────────────────────────────────────

function LessonScreen({zone, onNav, onDone}) {
  const lessons = LESSONS.default;
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showExp, setShowExp] = useState(false);
  const [answers, setAnswers] = useState([]);
  const lesson = lessons[idx];
  const total = lessons.length;

  useEffect(()=>{ setSelected(null); setShowExp(false); },[idx]);
  useEffect(()=>{
    if(selected!==null){ const t=setTimeout(()=>setShowExp(true),350); return ()=>clearTimeout(t); }
  },[selected]);

  const correct = lesson.options.find(o=>o.id===selected)?.correct;

  const handleNext = () => {
    const newAnswers = [...answers, {correct}];
    if(idx+1>=total){ onDone(newAnswers); }
    else{ setAnswers(newAnswers); setIdx(idx+1); }
  };

  const optStyle = (opt) => {
    if(selected===null) return {background:'#fff',border:'2px solid #e5e7eb',color:'#1e3a5f',cursor:'pointer'};
    if(opt.correct) return {background:'#dcfce7',border:'2px solid #22c55e',color:'#166534'};
    if(opt.id===selected&&!opt.correct) return {background:'#fee2e2',border:'2px solid #ef4444',color:'#991b1b'};
    return {background:'#f9fafb',border:'2px solid #e5e7eb',color:'#9ca3af',opacity:0.55};
  };

  const diffColor = {Easy:'#22c55e',Medium:'#f59e0b',Hard:'#ef4444'};

  return (
    <div style={{minHeight:'100vh',background:'#f0fdf4',display:'flex',flexDirection:'column'}}>
      {/* Header */}
      <div style={{background:'#1e3a5f',padding:'12px 14px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:9}}>
          <button onClick={()=>onNav('map')} style={{background:'rgba(255,255,255,0.15)',border:'none',borderRadius:10,padding:'7px 12px',color:'#fff',fontSize:17,cursor:'pointer'}}>←</button>
          <div style={{textAlign:'center'}}>
            <div style={{color:'#fff',fontWeight:800,fontSize:14}}>{zone?.emoji} {lesson.subtitle}</div>
            <div style={{color:'rgba(255,255,255,0.55)',fontSize:11}}>{lesson.title}</div>
          </div>
          <div style={{background:'linear-gradient(135deg,#d97706,#f59e0b)',borderRadius:20,padding:'4px 10px',fontSize:12,fontWeight:700,color:'#fff'}}>⭐ 124</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:7}}>
          <ProgressBar value={idx+(selected!==null?1:0)} max={total} color="#22c55e" h={6} />
          <span style={{fontSize:10,color:'rgba(255,255,255,0.6)',whiteSpace:'nowrap'}}>{idx+1}/{total}</span>
        </div>
        <div style={{display:'flex',gap:6,marginTop:7}}>
          <span style={{background:diffColor[lesson.difficulty]||'#6b7280',color:'#fff',borderRadius:99,padding:'2px 9px',fontSize:10,fontWeight:700}}>{lesson.difficulty}</span>
          {lesson.streak>0&&<span style={{background:'linear-gradient(135deg,#ef4444,#f97316)',color:'#fff',borderRadius:99,padding:'2px 9px',fontSize:10,fontWeight:700}}>🔥 Streak {lesson.streak}</span>}
        </div>
      </div>

      {/* Scenario */}
      <div style={{background:'linear-gradient(135deg,#1e40af,#3b82f6)',padding:'14px'}}>
        <div style={{display:'flex',gap:10,alignItems:'flex-start',marginBottom:11}}>
          <div style={{width:38,height:38,background:'rgba(255,255,255,0.2)',borderRadius:50,display:'flex',alignItems:'center',justifyContent:'center',fontSize:19,flexShrink:0}}>🧑‍🏫</div>
          <div style={{background:'rgba(255,255,255,0.15)',borderRadius:'4px 13px 13px 13px',padding:'9px 13px'}}>
            <div style={{color:'#fff',fontWeight:800,fontSize:14,marginBottom:2}}>{lesson.title}</div>
            <div style={{color:'rgba(255,255,255,0.85)',fontSize:12}}>{lesson.scenario}</div>
          </div>
        </div>
        <Pitch players={lesson.players}/>
      </div>

      {/* Q&A */}
      <div style={{padding:'14px',flex:1}}>
        <div style={{fontWeight:800,fontSize:15,color:'#1e3a5f',marginBottom:11}}>{lesson.question}</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {lesson.options.map(opt=>(
            <button key={opt.id} onClick={()=>selected===null&&setSelected(opt.id)}
              style={{...optStyle(opt),borderRadius:13,padding:'12px 13px',display:'flex',alignItems:'center',gap:9,fontSize:13,fontWeight:600,textAlign:'left',transition:'all 0.2s'}}>
              <span style={{width:27,height:27,borderRadius:8,background:selected!==null&&opt.correct?'#22c55e':selected===opt.id&&!opt.correct?'#ef4444':'#e5e7eb',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:selected!==null&&(opt.correct||opt.id===selected)?'#fff':'#6b7280',flexShrink:0}}>
                {selected!==null&&opt.correct?'✓':selected===opt.id&&!opt.correct?'✗':opt.id}
              </span>
              <span style={{fontSize:14}}>{opt.icon}</span>
              {opt.text}
            </button>
          ))}
        </div>
        {showExp&&(
          <div style={{marginTop:11,background:correct?'#dcfce7':'#fee2e2',border:`1.5px solid ${correct?'#22c55e':'#ef4444'}`,borderRadius:13,padding:'11px 13px',animation:'slideUp 0.3s ease'}}>
            <div style={{fontWeight:700,fontSize:12,color:correct?'#166534':'#991b1b'}}>{lesson.explanation}</div>
          </div>
        )}
      </div>

      <div style={{padding:'0 14px 24px'}}>
        <Btn onClick={handleNext} disabled={selected===null} style={{width:'100%',opacity:selected===null?0.5:1}}>Next →</Btn>
      </div>
    </div>
  );
}

function ResultsScreen({answers, onPlayAgain, onNav}) {
  const [animIn, setAnimIn] = useState(false);
  useEffect(()=>{ const t=setTimeout(()=>setAnimIn(true),120); return ()=>clearTimeout(t); },[]);
  const correct = answers.filter(a=>a.correct).length;
  const total = answers.length||3;
  const acc = Math.round((correct/total)*100);
  const stars = acc>=90?3:acc>=60?2:1;
  const isPerfect = correct===total;

  const pieces = Array.from({length:28}).map((_,i)=>({
    id:i, x:Math.random()*100, delay:Math.random()*1.2,
    color:['#f59e0b','#22c55e','#3b82f6','#ef4444','#a855f7'][i%5],
    size:5+Math.random()*7,
  }));

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(180deg,#1a472a,#2d6a3f 50%,#1e3a5f)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'24px 18px',position:'relative',overflow:'hidden'}}>
      {/* Confetti */}
      <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>
        {pieces.map(p=><div key={p.id} style={{position:'absolute',left:`${p.x}%`,top:'-10px',width:p.size,height:p.size,background:p.color,borderRadius:Math.random()>0.5?'50%':2,animation:`fall ${1.4+Math.random()}s ${p.delay}s ease-in forwards`}}/>)}
      </div>

      <div style={{background:'rgba(255,255,255,0.09)',backdropFilter:'blur(10px)',border:'1.5px solid rgba(255,255,255,0.14)',borderRadius:24,padding:'26px 22px',width:'100%',maxWidth:360,textAlign:'center',transform:animIn?'scale(1) translateY(0)':'scale(0.88) translateY(20px)',opacity:animIn?1:0,transition:'all 0.5s cubic-bezier(0.34,1.56,0.64,1)'}}>
        <div style={{fontSize:60,marginBottom:6,display:'inline-block',animation:animIn?'bounce 0.6s 0.5s ease both':'none'}}>🏆</div>
        <div style={{fontSize:30,fontWeight:900,color:'#fff',marginBottom:3}}>{isPerfect?'PERFECT!':acc>=60?'BRILLIANT!':'GOOD TRY!'}</div>
        <div style={{color:'rgba(255,255,255,0.65)',fontSize:13,marginBottom:18}}>{isPerfect?'You aced it! Incredible!':'You crushed this round!'}</div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
          {[{label:'Score',value:`${correct}/${total}`,emoji:'⚽'},{label:'Accuracy',value:`${acc}%`,emoji:'🎯'}].map(item=>(
            <div key={item.label} style={{background:'rgba(255,255,255,0.1)',borderRadius:14,padding:'13px 10px'}}>
              <div style={{fontSize:20,marginBottom:3}}>{item.emoji}</div>
              <div style={{fontSize:22,fontWeight:900,color:'#fff'}}>{item.value}</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,0.55)'}}>{item.label}</div>
            </div>
          ))}
        </div>

        <div style={{display:'flex',justifyContent:'center',marginBottom:14}}><Stars count={stars} max={3} size={34}/></div>

        <div style={{background:'linear-gradient(135deg,#d97706,#f59e0b)',borderRadius:13,padding:'11px 14px',marginBottom:14,display:'flex',alignItems:'center',gap:9}}>
          <span style={{fontSize:22}}>🧑‍🏫</span>
          <span style={{fontSize:12,fontWeight:700,color:'#fff'}}>{isPerfect?'Perfect score! You\'re a champion! 🏆':'Keep it up, Champion! 💪 Almost there!'}</span>
        </div>

        <div style={{background:'rgba(34,197,94,0.18)',border:'1px solid rgba(34,197,94,0.28)',borderRadius:11,padding:'7px 14px',marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{color:'#86efac',fontSize:12,fontWeight:600}}>⚡ XP Earned</span>
          <span style={{color:'#22c55e',fontSize:17,fontWeight:900}}>+{correct*10}</span>
        </div>

        <div style={{display:'flex',gap:9}}>
          <Btn onClick={onPlayAgain} style={{flex:1}}>🔄 Play Again</Btn>
          <button onClick={()=>onNav('map')} style={{flex:1,background:'rgba(255,255,255,0.13)',color:'#fff',border:'2px solid rgba(255,255,255,0.22)',borderRadius:13,padding:'13px 10px',fontSize:13,fontWeight:700,cursor:'pointer'}}>🗺️ Back to Map</button>
        </div>
      </div>
    </div>
  );
}

          <div style={{fontWeight:800,color:'#1e3a5f',marginBottom:11,fontSize:14}}>🗺️ Zone Progress</div>
          {zones.map(z=>(
            <div key={z.name} style={{marginBottom:9}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,fontWeight:600,color:'#374151',marginBottom:3}}>
                <span>{z.name}</span><span style={{color:z.color}}>{z.done}/{z.total}</span>
              </div>
              <ProgressBar value={z.done} max={z.total} color={z.color} h={6}/>

                  {item.owned?<div style={{background:'#dcfce7',color:'#16a34a',borderRadius:99,padding:'4px 11px',fontSize:10,fontWeight:700}}>✓ Owned</div>
                    :<button style={{background:'linear-gradient(135deg,#d97706,#f59e0b)',color:'#fff',border:'none',borderRadius:99,padding:'5px 13px',fontSize:11,fontWeight:700,cursor:'pointer'}}>⭐ {item.cost}</button>}
                </div>

      <NavBar active="awards" onNav={onNav}/>

}

// ─── APP ─────────────────────────────────────────────────────────────────────

function App() {
  const [screen, setScreen] = useState('home');
  const [zone, setZone] = useState(null);
  const [answers, setAnswers] = useState([]);

  const onNav = (s) => setScreen(s);
  const onZone = (z) => { setZone(z); setAnswers([]); setScreen('lesson'); };
  const onDone = (ans) => { setAnswers(ans); setScreen('results'); };
  const onPlayAgain = () => { setAnswers([]); setScreen('lesson'); };

  const wrap = (children) => (
    <div style={{maxWidth:430,margin:'0 auto',minHeight:'100vh',position:'relative',overflowX:'hidden',boxShadow:'0 0 60px rgba(0,0,0,0.25)'}}>
      {children}
    </div>
  );

  if(screen==='home') return wrap(<HomeScreen state={{}} onNav={onNav} onZone={onZone}/>);
  if(screen==='map') return wrap(<MapScreen onNav={onNav} onZone={onZone}/>);
  if(screen==='lesson') return wrap(<LessonScreen zone={zone} onNav={onNav} onDone={onDone}/>);
  if(screen==='results') return wrap(<ResultsScreen answers={answers} onPlayAgain={onPlayAgain} onNav={onNav}/>);
  if(screen==='profile') return wrap(<ProfileScreen onNav={onNav}/>);
  if(screen==='awards') return wrap(<AwardsScreen onNav={onNav}/>);
  return wrap(<HomeScreen state={{}} onNav={onNav} onZone={onZone}/>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
